<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BookGrab</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="container">
  <h1>BookGrab</h1>
  {% if not logged_in %}
  <div id="loginCard" class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
  </div>
  {% endif %}

  <div id="app" class="{% if not logged_in %}hidden{% endif %}">
    <div class="card">
      <input id="query" placeholder="Search title/author/narrator/series" />
      <select id="mediaType"><option value="audiobook">Audiobook</option><option value="ebook">E-book</option></select>
      <select id="sort"><option value="seedersDesc">Seeders desc</option><option value="addedDesc">Added desc</option><option value="sizeAsc">Size asc</option><option value="sizeDesc">Size desc</option></select>
      <div>
        <label><input type="checkbox" value="title" checked />Title</label>
        <label><input type="checkbox" value="author" checked />Author</label>
        <label><input type="checkbox" value="narrator" checked />Narrator</label>
        <label><input type="checkbox" value="series" checked />Series</label>
      </div>
      <button id="searchBtn">Search</button>
    </div>
    <div id="status"></div>
    <div class="card source-auth-card">
      <h2>MAM Source Auth</h2>
      <div id="sourceAuthStatus" class="source-auth-status">Loading source auth status...</div>
      <button id="refreshSeedboxBtn" type="button">Refresh dynamic seedbox IP now</button>
      <div class="source-auth-form">
        <input id="mamCookieInput" type="password" autocomplete="off" placeholder="Paste MAM API mam_id token/cookie" />
        <button id="saveMamCookieBtn" type="button">Save cookie/token</button>
      </div>
    </div>
    <table id="results">
      <thead>
        <tr>
          <th>Book</th>
          <th>Details</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script>
window.DEFAULTS = {
  mediaType: "{{ defaults.default_media_type }}",
  sort: "{{ defaults.default_sort }}"
};
</script>
<script src="/static/app.js"></script>
</body>
</html>
