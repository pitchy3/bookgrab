services:
  bookgrab:
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: bookgrab
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./config:/config
    restart: unless-stopped
